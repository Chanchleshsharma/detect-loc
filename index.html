<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Locate Me</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --accent: #7c6af7;
      --accent2: #4fd1c5;
      --text: #f0eeff;
      --muted: #7a7a9a;
      --border: rgba(124,106,247,0.18);
      --mono: 'Space Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── GRID LINES BG ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GLOW ── */
    .glow-orb {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 3rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.7);
      backdrop-filter: blur(16px);
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .nav-tag {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--mono);
      border: 1px solid var(--border);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 7rem 2rem 4rem;
      text-align: center;
    }

    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .hero-title {
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 700;
      line-height: 1.0;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    .hero-title span {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    /* ── CTA BUTTON ── */
    .cta-wrap {
      position: relative;
      display: inline-block;
    }
    .cta-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      z-index: 0;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cta-wrap:hover::before { opacity: 1; }

    #loc-btn {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 36px;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.01em;
    }
    #loc-btn:hover { background: var(--surface2); transform: translateY(-1px); }
    #loc-btn:active { transform: scale(0.98); }
    #loc-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── RESULT CARD ── */
    #result-section {
      display: none;
      position: relative;
      z-index: 1;
      padding: 0 2rem 6rem;
    }

    .result-card {
      max-width: 680px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #ff5f57; }
    .dot.yellow { background: #febc2e; }
    .dot.green { background: #28c840; }
    .card-header-title {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      margin-left: 6px;
    }

    .card-body { padding: 2rem 2rem 1.5rem; }

    .coord-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .coord-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
    }
    .coord-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .coord-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .accuracy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--surface2);
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .accuracy-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent2);
    }

    .maps-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: opacity 0.2s, transform 0.15s;
    }
    .maps-btn:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── ERROR ── */
    #error-box {
      display: none;
      max-width: 480px;
      margin: 1.5rem auto 0;
      background: rgba(220,53,69,0.08);
      border: 1px solid rgba(220,53,69,0.25);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      font-family: var(--mono);
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
    }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      font-family: var(--mono);
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    @media (max-width: 500px) {
      nav { padding: 1rem 1.25rem; }
      .coord-grid { grid-template-columns: 1fr; }
      .hero-sub { font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="glow-orb"></div>

  <nav>
    <span class="nav-logo">locate.me</span>
    <span class="nav-tag">v1.0 · browser API</span>
  </nav>

  <section class="hero">
    <div class="eyebrow">geolocation utility</div>
    <h1 class="hero-title">Where are<br>you <span>right now?</span></h1>
    <p class="hero-sub">One click. Your exact coordinates, pinned on a map — no app, no sign-up, no tracking.</p>

    <div class="cta-wrap">
      <button id="loc-btn" onclick="getLocation()">
        <span class="btn-dot"></span>
        Detect my location
      </button>
    </div>

    <div id="error-box"></div>
  </section>

  <section id="result-section">
    <div class="result-card">
      <div class="card-header">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="card-header-title">location_data.json</span>
      </div>
      <div class="card-body">
        <div class="coord-grid">
          <div class="coord-item">
            <div class="coord-label">Latitude</div>
            <div class="coord-value" id="lat-val">—</div>
          </div>
          <div class="coord-item">
            <div class="coord-label">Longitude</div>
            <div class="coord-value" id="lon-val">—</div>
          </div>
        </div>
        <div class="accuracy-row">
          <span class="accuracy-dot"></span>
          <span id="acc-val">Accuracy: —</span>
        </div>
        <a class="maps-btn" id="maps-link" href="#" target="_blank">
          ↗ Open in Google Maps
        </a>
      </div>
    </div>
  </section>

  <footer>built with the browser geolocation API · no data stored</footer>

  <script>
    function getLocation() {
      const btn = document.getElementById('loc-btn');
      const errorBox = document.getElementById('error-box');
      errorBox.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-dot"></span> Detecting…';

      if (!navigator.geolocation) {
        showError('Geolocation is not supported by your browser.');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          const lat = pos.coords.latitude.toFixed(6);
          const lon = pos.coords.longitude.toFixed(6);
          const acc = Math.round(pos.coords.accuracy);

          document.getElementById('lat-val').textContent = lat;
          document.getElementById('lon-val').textContent = lon;
          document.getElementById('acc-val').textContent = 'Accuracy: ±' + acc + ' meters';
          document.getElementById('maps-link').href = 'https://www.google.com/maps?q=' + lat + ',' + lon;

          document.getElementById('result-section').style.display = 'block';
          document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });

          btn.disabled = false;
          btn.innerHTML = '<span class="btn-dot"></span> Detect my location';
        },
        function(err) {
          const msgs = {
            1: 'Permission denied — allow location access in your browser settings.',
            2: 'Position unavailable. Could not detect your location.',
            3: 'Request timed out. Please try again.'
          };
          showError(msgs[err.code] || 'Unknown error occurred.');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function showError(msg) {
      const btn = document.getElementById('loc-btn');
      const errorBox = document.getElementById('error-box');
      errorBox.textContent = '⚠ ' + msg;
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<span class="btn-dot"></span> Detect my location';
    }
  </script>
</body>
</html>
